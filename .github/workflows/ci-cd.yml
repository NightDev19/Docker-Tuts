name: MySite CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      MONGODB_CONNECTION_STRING: mongodb://root:example@localhost:27017/todolist?authSource=admin

    services:
      mongodb:
        image: mongo:7.0.12
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        run: pytest -v test

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backend env file
        run: |
          cat > backend/.env <<EOF
          MONGODB_CONNECTION_STRING=mongodb://root:example@mongodb:27017/todolist?authSource=admin
          EOF

      - name: Create mongodb env file
        run: |
          cat > mongodb/.env <<EOF
          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=example
          EOF

      - name: Create mongo-express env file
        run: |
          cat > mongo-express/.env <<EOF
          ME_CONFIG_MONGODB_URL=mongodb://root:example@mongodb:27017/?authSource=admin
          ME_CONFIG_BASICAUTH_USERNAME=root
          ME_CONFIG_BASICAUTH_PASSWORD=example
          EOF

      - name: Build Docker images
        run: docker compose build

  docker-push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/mysite-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/mysite-frontend:latest \
            ./frontend

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository_owner }}/mysite-backend:latest

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository_owner }}/mysite-frontend:latest
