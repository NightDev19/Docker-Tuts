name: Docker Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/nightdev19/mysite-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ghcr.io/nightdev19/mysite-frontend:latest \
            ./frontend

      - name: Push backend image
        run: docker push ghcr.io/nightdev19/mysite-backend:latest

      - name: Push frontend image
        run: docker push ghcr.io/nightdev19/mysite-frontend:latest
